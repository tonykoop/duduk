  <text x="10"  y="96">A3</text>  <text x="70" y="96">●</text><text x="100" y="96">●</text><text x="128" y="96">●</text><text x="156" y="96">●</text><text x="184" y="96">●</text><text x="212" y="96">●</text><text x="240" y="96">●</text><text x="278" y="96">●</text><text x="306" y="96">●</text><text x="344" y="96">fundamental</text>
  <text x="10" y="116">Bb3</text> <text x="70" y="116">●</text><text x="100" y="116">●</text><text x="128" y="116">●</text><text x="156" y="116">●</text><text x="184" y="116">●</text><text x="212" y="116">●</text><text x="240" y="116">●</text><text x="278" y="116">●</text><text x="306" y="116">○</text>
  <text x="10" y="136">B3</text>  <text x="70" y="136">●</text><text x="100" y="136">●</text><text x="128" y="136">●</text><text x="156" y="136">●</text><text x="184" y="136">●</text><text x="212" y="136">●</text><text x="240" y="136">●</text><text x="278" y="136">○</text><text x="306" y="136">○</text>
