  <text x="10" y="196">E4</text>  <text x="70" y="196">●</text><text x="100" y="196">●</text><text x="128" y="196">●</text><text x="156" y="196">●</text><text x="184" y="196">○</text><text x="212" y="196">○</text><text x="240" y="196">○</text><text x="278" y="196">○</text><text x="306" y="196">○</text>
