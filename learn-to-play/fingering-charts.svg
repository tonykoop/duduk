  <text x="350" y="350" text-anchor="middle" fill="#555" font-size="11">Duduk has 8 front holes + 1 thumb hole. Chromatic notes use half-holing and cross-fingering.</text>
  <text x="350" y="368" text-anchor="middle" fill="#555" font-size="11">Glides ({X}Y in ABC) = slow portamento. Embouchure controls pitch, not just breath.</text>
  <text x="350" y="390" text-anchor="middle" fill="#555" font-size="11">Generated by sheet-music skill — Refs #1</text>
</svg>